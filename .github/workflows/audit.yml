name: Run sustainability audits

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {}
  push:
    paths:
      - 'urls.txt'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run audits
        run: npm run audit

      - name: Commit updated reports
        run: |
          git config user.name "greenorbit-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/reports
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: automated audit run $(date -u +'%Y-%m-%d')"
            git push
          fi

  trigger-deploy:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: reports-updated
